{% extends 'web/base.html' %}

{% block content %}
<div class="card hero-card">
    <h1>🏆 Сборник задач по олимпиадному программированию</h1>
    <p class="hero-text">
        Добро пожаловать! Здесь вы найдете задачи по различным темам, сможете отслеживать свой прогресс и улучшать навыки программирования.
    </p>
</div>

<div class="card">
    <h2>📊 Статистика по задачам</h2>
    <div id="stats">
        <div class="loading">Загрузка статистики...</div>
    </div>
</div>

<script>
    fetch('/api/problems/')
        .then(res => res.json())
        .then(data => {
            const statsContainer = document.getElementById('stats');
            if (data.data) {
                const total = data.data.length;
                const easy = data.data.filter(p => p.difficulty === 'easy').length;
                const medium = data.data.filter(p => p.difficulty === 'medium').length;
                const hard = data.data.filter(p => p.difficulty === 'hard').length;
                
                statsContainer.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card stat-total">
                            <div class="stat-number">${total}</div>
                            <div class="stat-label">Всего задач</div>
                        </div>
                        <div class="stat-card stat-easy">
                            <div class="stat-number">${easy}</div>
                            <div class="stat-label">Легкие</div>
                        </div>
                        <div class="stat-card stat-medium">
                            <div class="stat-number">${medium}</div>
                            <div class="stat-label">Средние</div>
                        </div>
                        <div class="stat-card stat-hard">
                            <div class="stat-number">${hard}</div>
                            <div class="stat-label">Сложные</div>
                        </div>
                    </div>
                `;
            } else {
                statsContainer.innerHTML = '<div class="empty-state">📊 Статистика временно недоступна</div>';
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            document.getElementById('stats').innerHTML = '<div class="empty-state error">❌ Ошибка загрузки статистики</div>';
        });
</script>

<style>
    .hero-card {
        background: white;
        color: #2c3e50;
        text-align: center;
    }
    
    .hero-card h1 {
        color: #2c3e50;
        border-bottom: none;
    }
    
    .hero-text {
        font-size: 18px;
        line-height: 1.6;
        margin-top: 20px;
        opacity: 0.95;
    }
    
    /* Статистика */
    .stats-grid {
        display: flex;
        gap: 20px;
        justify-content: space-around;
        flex-wrap: wrap;
        text-align: center;
    }
    
    .stat-card {
        background: #f8f9fa;
        border-radius: 20px;
        padding: 20px 30px;
        min-width: 120px;
        transition: all 0.3s ease;
    }
    
    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    
    .stat-number {
        font-size: 36px;
        font-weight: bold;
    }
    
    .stat-label {
        font-size: 14px;
        color: #7f8c8d;
        margin-top: 8px;
    }
    
    .stat-total .stat-number { color: #3498db; }
    .stat-easy .stat-number { color: #2ecc71; }
    .stat-medium .stat-number { color: #f39c12; }
    .stat-hard .stat-number { color: #e74c3c; }
    
    .loading {
        text-align: center;
        padding: 30px;
        color: #7f8c8d;
    }
    
    .empty-state {
        text-align: center;
        padding: 30px;
        color: #7f8c8d;
    }
    
    .empty-state.error {
        color: #e74c3c;
    }
    
    h1 {
        color: #2c3e50;
        border-bottom: 2px solid #3498db;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }
    
    h2 {
        color: #34495e;
        margin-bottom: 15px;
        font-size: 22px;
    }
    
    /* Адаптивность */
    @media (max-width: 600px) {
        .stats-grid {
            gap: 10px;
        }
        
        .stat-card {
            padding: 15px 20px;
            min-width: 80px;
        }
        
        .stat-number {
            font-size: 24px;
        }
    }
</style>
{% endblock %}
