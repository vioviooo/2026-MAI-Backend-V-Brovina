version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: olymp_catalog
      POSTGRES_USER: olymp_user
      POSTGRES_PASSWORD: olymp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olymp_user -d olymp_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  django:
    build: .
    environment:
      DB_NAME: olymp_catalog
      DB_USER: olymp_user
      DB_PASSWORD: olymp_pass
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - .:/app:delegated
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/problems/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network

volumes:
  postgres_data:
  static_volume:

networks:
  app_network: