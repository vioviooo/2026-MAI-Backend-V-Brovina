version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: olymp_catalog
      POSTGRES_USER: olymp_user
      POSTGRES_PASSWORD: olymp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olymp_user -d olymp_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: